<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Web Design &amp; WhatsApp Automation Blog — WebResolv</title>
  <meta name="description" content="Read expert insights, guides, and articles on web development, WhatsApp lead automation, and search engine optimization for growing businesses." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://webresolv.in/blog.html" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://webresolv.in/blog.html" />
  <meta property="og:title" content="Web Design &amp; WhatsApp Automation Blog — WebResolv" />
  <meta property="og:description" content="Read expert insights, guides, and articles on web development, WhatsApp lead automation, and search engine optimization for growing businesses." />
  <meta property="og:image" content="https://webresolv.in/images/cover.webp" />
  <meta property="og:site_name" content="WebResolv" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Web Design &amp; WhatsApp Automation Blog — WebResolv" />
  <meta name="twitter:description" content="Read expert insights, guides, and articles on web development, WhatsApp lead automation, and search engine optimization for growing businesses." />
  <meta name="twitter:image" content="https://webresolv.in/images/cover.webp" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <link rel="manifest" href="/site.webmanifest" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/lucide@latest"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg-color: #050505;
      --accent: #f97316;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg-color);
      color: #ffffff;
      overflow-x: hidden;
    }

    @media (min-width: 768px) {
      body {
        cursor: none;
      }
    }

    h1,
    h2,
    h3,
    h4,
    .font-display {
      font-family: "Space Grotesk", sans-serif;
    }

    /* FX */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .spotlight {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(600px circle at var(--x) var(--y),
          rgba(249, 115, 22, 0.15),
          transparent 40%);
    }

    .cursor-dot,
    .cursor-outline {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 9999;
      pointer-events: none;
    }

    .cursor-dot {
      width: 8px;
      height: 8px;
      background: white;
    }

    .cursor-outline {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: width 0.2s, height 0.2s;
    }

    body:hover .cursor-outline {
      width: 40px;
      height: 40px;
    }

    a:hover~.cursor-outline,
    button:hover~.cursor-outline {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.1);
      border-color: transparent;
    }

    /* UI */
    .glass {
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s cubic-bezier(0.5, 0, 0, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="antialiased selection:bg-orange-500 selection:text-white">
  <div class="noise-overlay"></div>
  <div class="spotlight" id="spotlight"></div>
  <div class="cursor-dot hidden md:block" id="cursor-dot"></div>
  <div class="cursor-outline hidden md:block" id="cursor-outline"></div>

  <!-- NAV -->
  <nav id="top-nav"
    class="fixed top-0 w-full z-40 px-4 md:px-6 py-4 md:py-6 flex justify-between items-center mix-blend-difference text-white transition-all duration-500">
    <div class="flex items-center gap-3 md:gap-4">
      <a href="/" class="font-display font-bold text-lg md:text-xl tracking-tighter hover:text-orange-500 transition-colors clickable">
        WebResolv<span class="text-orange-500">.</span>
      </a>
      <a href="/#insights"
        class="glass px-3 py-1.5 rounded-full text-[9px] md:text-[10px] font-bold text-gray-400 hover:text-white hover:border-white transition-all clickable flex items-center gap-1">
        <i data-lucide="arrow-left" class="w-3 h-3"></i>
        <span>JOURNAL</span>
      </a>
    </div>

    <!-- Right Side Actions -->
    <div class="flex items-center gap-2 md:gap-3">
      <a href="mailto:webresolv16@gmail.com"
        class="glass px-3 md:px-6 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-bold hover:bg-white hover:text-black hover:border-white transition-all clickable touch-manipulation">START
        PROJECT</a>

      <a href="https://wa.me/919217671611" target="_blank" rel="noopener noreferrer"
        class="glass px-3 md:px-6 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-bold hover:bg-[#25D366] hover:text-black hover:border-[#25D366] transition-all clickable touch-manipulation flex items-center gap-1.5">
        <i data-lucide="message-circle" class="w-3.5 h-3.5 md:w-4 h-4 text-[#25D366]"></i>
        <span>WHATSAPP</span>
      </a>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="relative min-h-[60vh] flex items-end pb-16 px-6 md:px-12 pt-36">
    <div class="absolute inset-0 z-0">
      <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/75 to-transparent z-10"></div>
      <img id="article-hero-bg" src="" width="1920" height="1080" class="w-full h-full object-cover object-center opacity-40" alt="Article background" />
    </div>

    <div class="relative z-20 w-full max-w-4xl mx-auto border-t border-white/10 pt-8 reveal">
      <div class="flex flex-wrap gap-3 mb-6">
        <span id="article-tag" class="px-3 py-1 border border-orange-500/30 bg-orange-500/10 rounded-full text-[10px] uppercase tracking-widest text-orange-400 font-bold">Category</span>
        <span id="article-readtime" class="px-3 py-1 border border-white/10 bg-white/5 rounded-full text-[10px] uppercase tracking-widest text-gray-400 font-bold">5 Min Read</span>
      </div>
      <h1 id="article-title" class="text-4xl md:text-7xl font-black tracking-tighter text-white uppercase leading-tight mb-8">
        Article Title
      </h1>
      
      <div class="flex items-center gap-4 text-sm text-gray-400">
        <div class="flex flex-col">
          <span class="text-xs uppercase tracking-wider text-gray-600 font-bold">Author</span>
          <span id="article-author" class="text-white font-medium">WebResolv Editorial</span>
        </div>
        <div class="w-px h-8 bg-white/10"></div>
        <div class="flex flex-col">
          <span class="text-xs uppercase tracking-wider text-gray-600 font-bold">Published</span>
          <span id="article-date" class="text-white font-medium">May 28, 2026</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ARTICLE BODY -->
  <main class="relative z-10 max-w-4xl mx-auto px-6 pb-32">
    <article id="article-content" class="text-gray-300 leading-relaxed text-base md:text-lg space-y-8 font-light max-w-3xl border-b border-white/10 pb-20 reveal">
      <!-- Injected dynamic article contents -->
    </article>

    <!-- READ NEXT / RELATED -->
    <div class="mt-24 reveal">
      <h3 class="text-2xl font-bold text-white mb-10 font-display">Keep Reading</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="read-next-container">
        <!-- Injected read next cards -->
      </div>
    </div>

    <!-- BACK TO BLOG ACTION -->
    <div class="mt-20 pt-16 border-t border-white/5 text-center reveal">
      <a href="/#insights" class="inline-flex items-center gap-2 bg-orange-500/10 border border-orange-500/30 hover:bg-orange-500 px-6 py-3 rounded-full text-xs font-bold text-orange-400 hover:text-white transition-all duration-300">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span>Back to Insights</span>
      </a>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-black py-12 text-center border-t border-white/10 text-gray-600 text-sm relative z-10">
    <p class="mb-4">
      Ready to build something legendary?
      <a href="mailto:webresolv16@gmail.com" class="text-white underline">Contact Us</a>
    </p>
    © 2026 WebResolv Studio. <span class="text-neutral-800 mx-2">|</span> <a href="dashboard.html" class="text-gray-600 hover:text-orange-500 transition-colors">Admin Console</a>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();

    // Spotlight & Cursor Logic
    const spotlight = document.getElementById("spotlight");
    const cursorDot = document.getElementById("cursor-dot");
    const cursorOutline = document.getElementById("cursor-outline");

    window.addEventListener("mousemove", (e) => {
      const x = e.clientX;
      const y = e.clientY;
      spotlight.style.setProperty("--x", `${x}px`);
      spotlight.style.setProperty("--y", `${y}px`);
      cursorDot.style.left = `${x}px`;
      cursorDot.style.top = `${y}px`;
      cursorOutline.animate(
        { left: `${x}px`, top: `${y}px` },
        { duration: 500, fill: "forwards" }
      );
    });

    // Top Navbar Glassmorphism & Blur on Scroll
    const topNav = document.getElementById("top-nav");
    if (topNav) {
      window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
          topNav.classList.add("bg-[#050505]/80", "backdrop-blur-lg", "border-b", "border-white/5", "py-3");
          topNav.classList.remove("py-4", "md:py-6", "mix-blend-difference");
        } else {
          topNav.classList.remove("bg-[#050505]/80", "backdrop-blur-lg", "border-b", "border-white/5", "py-3");
          topNav.classList.add("py-4", "md:py-6", "mix-blend-difference");
        }
      });
    }

    // Intersection Observer for Reveal elements
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("active");
          }
        });
      },
      { threshold: 0.1 }
    );
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));

    // --- 1. DYNAMIC CONTENT INJECTION FROM LOCALSTORAGE ---
    let posts = [];
    try {
      posts = JSON.parse(localStorage.getItem("webresolv_posts")) || [];
    } catch (e) {
      console.error("Error reading localStorage:", e);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get("id");

    // Find the current post
    let activePost = posts.find(p => p.id === articleId);

    // If not found, default to first available post
    if (!activePost && posts.length > 0) {
      activePost = posts[0];
    }

    if (activePost) {
      // Page updates
      const cleanTitle = activePost.title.replace(/<br\s*\/?>/gi, " ").trim();
      document.title = `${cleanTitle} — WebResolv Blog`;
      document.getElementById("article-title").innerHTML = activePost.title;
      document.getElementById("article-tag").textContent = activePost.tag || "Insight";
      document.getElementById("article-readtime").textContent = activePost.readTime || "5 min read";
      document.getElementById("article-author").textContent = activePost.author || "WebResolv Editorial";
      document.getElementById("article-date").textContent = activePost.date || "";
      
      const postImage = activePost.image || "https://webresolv.in/images/cover.webp";
      document.getElementById("article-hero-bg").src = postImage;
      
      const cleanContent = activePost.content || "";
      document.getElementById("article-content").innerHTML = cleanContent;

      // Extract excerpt (first 150 chars of plain text) for description
      const tmpDiv = document.createElement("div");
      tmpDiv.innerHTML = cleanContent;
      const plainText = tmpDiv.textContent || tmpDiv.innerText || "";
      const excerpt = plainText.substring(0, 150).trim() + "...";

      // Dynamically update metadata for SEO
      const postURL = `https://webresolv.in/blog.html?id=${activePost.id}`;
      
      // Update canonical
      let canonicalEl = document.querySelector("link[rel='canonical']");
      if (canonicalEl) canonicalEl.setAttribute("href", postURL);
      
      // Update meta descriptions
      let descMeta = document.querySelector("meta[name='description']");
      if (descMeta) descMeta.setAttribute("content", excerpt);
      
      let ogDesc = document.querySelector("meta[property='og:description']");
      if (ogDesc) ogDesc.setAttribute("content", excerpt);
      
      let twDesc = document.querySelector("meta[name='twitter:description']");
      if (twDesc) twDesc.setAttribute("content", excerpt);

      // Update titles
      let ogTitle = document.querySelector("meta[property='og:title']");
      if (ogTitle) ogTitle.setAttribute("content", `${cleanTitle} — WebResolv Blog`);
      
      let twTitle = document.querySelector("meta[name='twitter:title']");
      if (twTitle) twTitle.setAttribute("content", `${cleanTitle} — WebResolv Blog`);

      // Update image meta
      let ogImg = document.querySelector("meta[property='og:image']");
      if (ogImg) ogImg.setAttribute("content", postImage);
      
      let twImg = document.querySelector("meta[name='twitter:image']");
      if (twImg) twImg.setAttribute("content", postImage);

      // Inject JSON-LD Article Schema
      const schemaScript = document.createElement("script");
      schemaScript.type = "application/ld+json";
      schemaScript.text = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": cleanTitle,
        "description": excerpt,
        "image": postImage,
        "author": {
          "@type": "Person",
          "name": activePost.author || "WebResolv Editorial",
          "url": "https://webresolv.in/"
        },
        "publisher": {
          "@type": "Organization",
          "name": "WebResolv",
          "logo": {
            "@type": "ImageObject",
            "url": "https://webresolv.in/favicon.svg"
          }
        },
        "datePublished": activePost.date || "2026-05-28",
        "mainEntityOfPage": postURL
      });
      document.head.appendChild(schemaScript);

      // --- RENDER READ NEXT ARTICLES ---
      const readNextContainer = document.getElementById("read-next-container");
      if (readNextContainer) {
        readNextContainer.innerHTML = "";
        
        // Find other posts (limit to 2 next articles)
        const otherPosts = posts.filter(p => p.id !== activePost.id).slice(0, 2);
        
        otherPosts.forEach(item => {
          const card = document.createElement("a");
          card.href = `blog.html?id=${item.id}`;
          card.className = "glass group rounded-2xl p-6 flex flex-col hover:border-orange-500/40 hover:-translate-y-1 transition-all duration-300 clickable";
          
          card.innerHTML = `
            <div class="aspect-[16/9] w-full rounded-xl overflow-hidden mb-4 bg-neutral-900 border border-white/5 relative">
              <img src="${item.image || 'https://images.unsplash.com/photo-1501504905252-473c47e087f8?q=80&w=600'}" 
                class="w-full h-full object-cover grayscale opacity-75 group-hover:grayscale-0 group-hover:scale-105 transition-all duration-500" alt="${item.title}" />
            </div>
            <div class="flex items-center justify-between text-[9px] text-gray-500 font-mono font-bold uppercase tracking-wider mb-2">
              <span class="${item.tagColor || 'text-orange-400'}">${item.tag || 'Insight'}</span>
              <span>${item.readTime || '5 min read'}</span>
            </div>
            <h4 class="text-lg font-bold text-white group-hover:text-orange-500 transition-colors leading-tight mb-2 font-display">
              ${item.title.replace("<br>", " ")}
            </h4>
            <div class="flex items-center gap-1.5 text-[10px] font-bold text-white uppercase tracking-wider mt-auto">
              <span>Read</span>
              <i data-lucide="arrow-right" class="w-3.5 h-3.5 text-orange-500"></i>
            </div>
          `;
          readNextContainer.appendChild(card);
        });
      }
    } else {
      // Empty state
      document.getElementById("article-title").innerHTML = "NO ARTICLES FOUND";
      document.getElementById("article-content").innerHTML = "<p>Please visit the <a href='dashboard.html' class='text-orange-500 underline'>Dashboard</a> to create a blog post.</p>";
    }

    // Re-create icons for newly added cards
    lucide.createIcons();
    });
  </script>
</body>

</html>
